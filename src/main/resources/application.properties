# src/main/resources/application.properties

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Spring Application
spring.application.name=hrms-backend

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hrms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rohit45}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
# Keep local development convenient while allowing safer overrides per environment.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Jackson Configuration
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration (Custom Properties)
app.jwt.secret=${APP_JWT_SECRET:CoreSyncHRMSLocalDevSecretKey2026MustBeChangedBeforeProductionUsage123456789}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Frontend / CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging Levels
logging.level.com.coresync.hrms=INFO
logging.level.org.springframework.security=WARN
